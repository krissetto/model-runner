name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version: 1.25.8
          cache: true

      - name: Set up Docker
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d

      - name: Run e2e tests
        run: make e2e
