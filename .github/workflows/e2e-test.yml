name: E2E Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '**'
      - 'llamacpp/native/vendor/llama.cpp'
  push:
    branches: [ main ]

jobs:
  e2e-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive

      - name: Load GO version
        id: versions
        uses: ./.github/actions/load-go-version

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ steps.versions.outputs.go-version }}
          cache: true

      - name: Set up Docker
        if: matrix.os == 'ubuntu-latest'
        uses: docker/setup-docker-action@1a6edb0ba9ac496f6850236981f15d8f9a82254d

      - name: Install build dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run e2e tests
        run: make e2e
